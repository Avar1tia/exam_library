{% extends 'base.html' %}
{% block content %}
<div class="form-panel">
  <h1 class="mb-2">Новая рецензия</h1>
  <p class="text-muted mb-4">{{ book.title }}</p>
  <form method="post">
    <div class="mb-3">
      <label class="form-label" for="rating">Оценка</label>
      <select class="form-select" id="rating" name="rating">
        {% for value, label in ratings %}
          <option value="{{ value }}" {% if value == 5 %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label" for="text">Текст рецензии</label>
      <textarea class="form-control markdown-editor" id="text" name="text" rows="10">{{ request.form.get('text', '') }}</textarea>
    </div>
    <button class="btn btn-primary">Сохранить</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('books.show', book_id=book.id) }}">Отмена</a>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  new EasyMDE({
    element: document.querySelector('.markdown-editor'),
    spellChecker: false,
    status: false
  });
</script>
{% endblock %}
